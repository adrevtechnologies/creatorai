name: Daily Metrics Collection

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  collect_metrics:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate database connectivity
        run: python main.py health

      - name: Capture workflow telemetry
        run: |
          mkdir -p output
          {
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > output/daily-metrics.txt

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-metrics
          path: output/daily-metrics.txt
          retention-days: 14
